name: stellcodex-worker

on:
  workflow_dispatch:

jobs:
  worker:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repo
        uses: actions/checkout@v3

      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: install redis
        run: pip install redis

      - name: run worker
        run: python worker.py

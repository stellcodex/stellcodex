name: stellcodex-v7-ci

on:
  push:
  pull_request:

jobs:
  v7-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validator deps
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema

      - name: Repo leak scan (forbidden tokens)
        run: |
          bash scripts/leak_scan_repo.sh .

      - name: Start stack (template)
        run: |
          echo "NOTE: This workflow is a skeleton. Wire it to your images/build."
          echo "If you have docker images, you can run docker compose here."
          # docker compose -f docker/docker-compose.prod.yml --env-file docker/.env.example up -d

      - name: Smoke test (template)
        run: |
          echo "NOTE: Enable after wiring stack startup."
          # BASE_URL=http://localhost:8000 bash scripts/smoke_test.sh

      - name: Release gate (template)
        run: |
          echo "NOTE: Enable after wiring stack + auth flow + SAMPLE_FILE."
          # BASE_URL=http://localhost:8000 SAMPLE_FILE=./samples/sample.step bash scripts/release_gate.sh

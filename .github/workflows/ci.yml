name: stellcodex-ci

on:
  push:
  pull_request:

jobs:
  backend-contracts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DATABASE_URL: postgresql://stellcodex:stellcodex@localhost:5432/stellcodex
      JWT_SECRET: stellcodex-ci-jwt-secret-1234567890
      PYTHONPATH: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validator deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest jsonschema

      - name: Repo leak scan (forbidden tokens)
        run: |
          bash scripts/leak_scan_repo.sh .

      - name: Backend unit and contract tests
        run: |
          python -m pytest backend/tests -q

  frontend-release-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
      NEXT_PUBLIC_API_BASE: http://127.0.0.1:8000
      STELLCODEX_ENABLE_MOCK_ADMIN: "1"
      DATABASE_URL: postgresql://stellcodex:stellcodex@localhost:5432/stellcodex
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: |
          npm ci --no-audit --no-fund

      - name: Frontend release gate
        run: |
          bash scripts/release-gate.sh

name: stell-worker

on:
  workflow_dispatch:

jobs:
  worker:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests redis

      - name: debug workspace
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "PWD:"
          pwd
          echo "TOP LEVEL LIST:"
          ls -la
          echo "FIND worker.py:"
          find . -maxdepth 3 -name "worker.py" -print -exec ls -la {} \;
          echo "CHECK ./worker.py:"
          test -f ./worker.py && echo "OK: ./worker.py exists" || (echo "ERROR: ./worker.py missing" && exit 2)

      - name: run worker
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          STELLCODEX_QUEUE_KEY: stellcodex:queue
        run: |
          python -V
          python ./worker.py

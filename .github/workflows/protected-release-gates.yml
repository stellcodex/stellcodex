name: protected-release-gates

on:
  pull_request:
    branches:
      - main

concurrency:
  group: protected-release-gates-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-contracts:
    name: backend-contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect backend changes
        id: backend_changes
        shell: bash
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.sha }}"
          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -q '^backend/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Backend unchanged
        if: steps.backend_changes.outputs.changed == 'false'
        run: echo "No backend paths changed."

      - name: Setup Python
        if: steps.backend_changes.outputs.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend test deps
        if: steps.backend_changes.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest

      - name: Run backend contract smoke
        if: steps.backend_changes.outputs.changed == 'true'
        env:
          PYTHONPATH: backend
          DATABASE_URL: postgresql://test:test@localhost/test
          JWT_SECRET: ci-test-secret-not-real-xxxxxxxxxxxxxxxx
        run: |
          pytest -q \
            backend/tests/test_format_registry_contract.py \
            backend/tests/test_guest_token_identity.py \
            backend/tests/test_hybrid_v1_geometry_merge_policy.py

  frontend-release-gate:
    name: frontend-release-gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: Build frontend
        run: npm run build

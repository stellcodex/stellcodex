version: "3.3"

services:
  postgres:
    image: postgres:15
    container_name: stellcodex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stellcodex
      POSTGRES_USER: stellcodex
      POSTGRES_PASSWORD: stellcodex
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stellcodex -d stellcodex"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7
    container_name: stellcodex-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  minio:
    image: minio/minio:RELEASE.2022-10-24T18-35-07Z
    container_name: stellcodex-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STELLCODEX_S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${STELLCODEX_S3_SECRET_ACCESS_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  backend:
    build:
      context: /var/www/stellcodex/backend
      dockerfile: Dockerfile.backend
    container_name: stellcodex-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - /var/stellcodex/work:/var/stellcodex/work
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      DATABASE_URL: postgresql+psycopg2://stellcodex:stellcodex@postgres:5432/stellcodex
      REDIS_URL: redis://redis:6379/0
      JWT_ALG: HS256
      JWT_SECRET: 1b6246485366c0222c4e50597030697f95b83be8d09fbbcdcc84ffac23a99f56
      REFRESH_TOKEN_DAYS: "14"
      ACCESS_TOKEN_MINUTES: "30"
      RATE_LIMIT_PER_HOUR: "2000"
      MAX_UPLOAD_BYTES: "209715200"
      FEATURE_FILES: "true"
      ALLOWED_CONTENT_TYPES: model/stl,model/step,model/iges,application/step,application/iges,application/pdf,image/png,image/jpeg,model/gltf-binary,model/gltf+json,application/octet-stream,text/plain
      CONVERSION_TIMEOUT_SECONDS: "1800"
      BLENDER_TIMEOUT_SECONDS: "600"
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET}

      STELLCODEX_S3_ENDPOINT_URL: http://stellcodex-minio:9000
      STELLCODEX_S3_REGION: us-east-1
      STELLCODEX_S3_BUCKET: stellcodex
      STELLCODEX_S3_ACCESS_KEY_ID: ${STELLCODEX_S3_ACCESS_KEY_ID}
      STELLCODEX_S3_SECRET_ACCESS_KEY: ${STELLCODEX_S3_SECRET_ACCESS_KEY}
      PUBLIC_S3_BASE_URL: https://stellcodex.com
      WORKDIR: /var/stellcodex/work
      ADMIN_TOKEN: a876a9832ea0ae153fa7872d3573c22fee9874cc4c5df8c1a7af065f5e1f7169
      STELL_WEBHOOK_BASE_URL: http://172.27.0.1:4500
      STELL_WEBHOOK_BRIDGE_HOST: ""
      STELL_INTERNAL_CHAT_TRANSPORT: http_first
      STELL_HTTP_BRIDGE_TIMEOUT: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  worker:
    build:
      context: /var/www/stellcodex/backend
      dockerfile: Dockerfile.worker
    container_name: stellcodex-worker
    restart: unless-stopped
    volumes:
      - /var/stellcodex/work:/var/stellcodex/work
    depends_on:
      - redis
      - postgres
      - minio
    environment:
      DATABASE_URL: postgresql+psycopg2://stellcodex:stellcodex@postgres:5432/stellcodex
      REDIS_URL: redis://redis:6379/0
      JWT_ALG: HS256
      JWT_SECRET: 1b6246485366c0222c4e50597030697f95b83be8d09fbbcdcc84ffac23a99f56
      REFRESH_TOKEN_DAYS: "14"
      ACCESS_TOKEN_MINUTES: "30"
      RATE_LIMIT_PER_HOUR: "2000"
      MAX_UPLOAD_BYTES: "209715200"
      FEATURE_FILES: "true"
      ALLOWED_CONTENT_TYPES: model/stl,model/step,model/iges,application/step,application/iges,application/pdf,image/png,image/jpeg,model/gltf-binary,model/gltf+json,application/octet-stream,text/plain
      CONVERSION_TIMEOUT_SECONDS: "1800"
      BLENDER_TIMEOUT_SECONDS: "600"
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET}

      STELLCODEX_S3_ENDPOINT_URL: http://stellcodex-minio:9000
      STELLCODEX_S3_REGION: us-east-1
      STELLCODEX_S3_BUCKET: stellcodex
      STELLCODEX_S3_ACCESS_KEY_ID: ${STELLCODEX_S3_ACCESS_KEY_ID}
      STELLCODEX_S3_SECRET_ACCESS_KEY: ${STELLCODEX_S3_SECRET_ACCESS_KEY}
      PUBLIC_S3_BASE_URL: https://stellcodex.com
      WORKDIR: /var/stellcodex/work

volumes:
  postgres_data: {}
  minio_data: {}
